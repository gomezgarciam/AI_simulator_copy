<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Sales Simulator - Live Mode</title>
    <style>
      body { margin: 0; font-family: "Inter", "Google Sans", sans-serif; background: transparent; color: #3c4043; }
      .container { display: flex; flex-direction: column; gap: 15px; padding: 10px; max-width: 100%; }
      #chat-history { display: flex; flex-direction: column; gap: 12px; max-height: 450px; overflow-y: auto; padding: 15px; border-radius: 12px; background: rgba(0, 0, 0, 0.02); border: 1px solid rgba(0, 0, 0, 0.05); }
      .bubble { padding: 10px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); transition: all 0.2s ease; }
      .user { align-self: flex-end; background: #1a73e8; color: white !important; border-bottom-right-radius: 4px; }
      .alex { align-self: flex-start; background: white; color: #3c4043 !important; border-bottom-left-radius: 4px; border: 1px solid #dadce0; }
      .interim { opacity: 0.7; font-style: italic; }
      .controls { display: flex; align-items: center; gap: 12px; }
      button { background-color: #d93025; color: white; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer; font-weight: 500; font-size: 14px; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
      button:hover { background-color: #b21f16; }
      button.recording { background-color: #202124; animation: pulse 2s infinite; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(217, 48, 37, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(217, 48, 37, 0); } 100% { box-shadow: 0 0 0 0 rgba(217, 48, 37, 0); } }
      .status-container { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #5f6368; }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #dadce0; }
      .status-dot.active { background: #1e8e3e; box-shadow: 0 0 4px #1e8e3e; }
      #debug-log { font-size: 10px; color: #9aa0a6; font-family: monospace; margin-top: 8px; border-top: 1px solid #f1f3f4; padding-top: 8px; overflow-wrap: break-word; }
      #vad-timer { font-size: 12px; color: #1e8e3e; font-style: italic; text-align: center; height: 18px; transition: opacity 0.3s; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="controls">
        <button id="record-btn">Start Live Session</button>
        <div class="status-container">
          <div id="status-dot" class="status-dot"></div>
          <span id="status-text">Disconnected</span>
        </div>
      </div>
      <div id="vad-timer"></div>
      <div id="chat-history"></div>
      <div id="debug-log">Ready.</div>
    </div>

    <script>
      const Streamlit = {
        setComponentReady: () => window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1}, "*"),
        setFrameHeight: () => window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: document.body.scrollHeight}, "*"),
        setComponentValue: (value) => window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value}, "*"),
      };

      const recordBtn = document.getElementById("record-btn");
      const chatHistory = document.getElementById("chat-history");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const debugLog = document.getElementById("debug-log");
      const vadTimerDiv = document.getElementById("vad-timer");

      let audioContext = null, processor = null, input = null, stream = null, socket = null;
      let isRecording = false, isCleaningUp = false, isMuted = false, isSessionFinished = false;
      let chunksSent = 0;
      let sessionMetadata = { language: "English", target_company: "Google", role: "CTO" };
      let lastUserBubble = null;
      let vadCountdownInterval = null;

      const UI_TEXTS = {
        "English": { start: "Start Live Session", stop: "Stop Session", live: "Live", disc: "Disconnected", connecting: "Conectando...", alex_greeting: "Hello, Im Alex. Im ready to listen.", thinking: "Alex is thinking..." },
        "Spanish": { start: "Iniciar Sesión en Vivo", stop: "Detener Sesión", live: "En Vivo", disc: "Desconectado", connecting: "Conectando...", alex_greeting: "Hola, soy Alex. Estoy listo para escuchar.", thinking: "Alex está pensando..." },
        "Portuguese": { start: "Iniciar Sessão ao Vivo", stop: "Parar Sessão", live: "Ao Vivo", disc: "Desconectado", connecting: "Conectando...", alex_greeting: "Olá, eu sou o Alex. Estou pronto para ouvir.", thinking: "Alex está a pensar..." }
      };

      const TABLE_TEXTS = {
        "English": {
            title: "Final Evaluation",
            status: "Status",
            total: "Total",
            param: "Parameter",
            rating: "Rating",
            points: "Points",
            feedback: "Executive Feedback",
            pts: "pts"
        },
        "Spanish": {
            title: "Evaluación Final",
            status: "Estado",
            total: "Total",
            param: "Parámetro",
            rating: "Calificación",
            points: "Puntos",
            feedback: "Feedback Ejecutivo",
            pts: "pts"
        },
        "Portuguese": {
            title: "Avaliação Final",
            status: "Status",
            total: "Total",
            param: "Parâmetro",
            rating: "Classificação",
            points: "Pontos",
            feedback: "Feedback Executivo",
            pts: "pts"
        }
      };

      function log(msg) { console.log(msg); debugLog.innerText = msg; }
      function stopVadTimer() { if (vadCountdownInterval) clearInterval(vadCountdownInterval); vadTimerDiv.innerText = ""; vadTimerDiv.style.opacity = 0; }

      window.addEventListener("message", (e) => {
        if (e.data.type === "streamlit:render" && e.data.args.metadata) {
          sessionMetadata = e.data.args.metadata;
          if (!isRecording) updateUI();
        }
      });

      function updateUI() {
        const t = UI_TEXTS[sessionMetadata.language] || UI_TEXTS["English"];
        if (!isRecording && !isSessionFinished) {
          recordBtn.innerText = t.start;
          statusText.innerText = t.disc;
          chatHistory.innerHTML = "";
          addBubble(t.alex_greeting, "alex");
        }
      }

      function addBubble(text, side, isInterim = false) {
        const b = document.createElement("div");
        b.className = `bubble ${side}`;
        if (isInterim) b.classList.add("interim");
        b.innerText = text;
        chatHistory.appendChild(b);
        chatHistory.scrollTop = chatHistory.scrollHeight;
        return b;
      }

      async function stopAudio() {
        if (isCleaningUp) return;
        isCleaningUp = true;
        log("Stopping audio capture...");
        if (processor) { processor.disconnect(); processor = null; }
        if (input) { input.disconnect(); input = null; }
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        if (audioContext && audioContext.state !== "closed") { try { await audioContext.close(); } catch(e) {} audioContext = null; }
        isCleaningUp = false;
      }

      async function cleanup() {
        log("Cleaning up session...");
        isRecording = false;
        await stopAudio();
        if (socket) { if (socket.readyState === WebSocket.OPEN) socket.close(); socket = null; }
        const t = UI_TEXTS[sessionMetadata.language] || UI_TEXTS["English"];
        recordBtn.innerText = t.start;
        recordBtn.classList.remove("recording");
        statusDot.classList.remove("active");
        statusText.innerText = t.disc;
        stopVadTimer();
        lastUserBubble = null;
      }

      async function startRecording() {
        if (isRecording) return;
        const t = UI_TEXTS[sessionMetadata.language] || UI_TEXTS["English"];
        
        isRecording = true;
        isSessionFinished = false;
        isMuted = false;
        chunksSent = 0;
        lastUserBubble = null;
        chatHistory.innerHTML = "";
        addBubble(t.alex_greeting, "alex");

        recordBtn.innerText = t.stop;
        recordBtn.classList.add("recording");
        statusText.innerText = t.connecting;

        try {
          const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
          const wsUrl = `${protocol}//${window.location.host}/ws/live-transcribe`;
          
          log("Connecting to WebSocket: " + wsUrl);
          socket = new WebSocket(wsUrl);

          socket.onopen = async () => {
            log("✅ WebSocket Connected");
            statusDot.classList.add("active");
            statusText.innerText = t.live;

            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Volvemos a la frecuencia nativa del navegador para evitar audios corruptos
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const sr = audioContext.sampleRate;
            log(`🎧 Audio Initialized @ ${sr}Hz`);

            // Enviamos la frecuencia REAL al backend
            socket.send(JSON.stringify({...sessionMetadata, sample_rate: sr}));

            input = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);
            
            processor.onaudioprocess = (e) => {
              if (!isRecording || !socket || socket.readyState !== WebSocket.OPEN) return;
              const inputData = e.inputBuffer.getChannelData(0);
              const pcmData = new Int16Array(inputData.length);
              
              for (let i = 0; i < inputData.length; i++) {
                // EL TRUCO MAGICO: Si está muteado enviamos 0 (silencio) para no cortar la conexión
                let s = isMuted ? 0 : Math.max(-1, Math.min(1, inputData[i]));
                pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
              }
              socket.send(pcmData.buffer);
            };

            input.connect(processor);
            processor.connect(audioContext.destination);
          };

          socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === "user_transcript") {
                stopVadTimer();
                if (!lastUserBubble) { lastUserBubble = addBubble(data.transcript, "user", true);
                } else { lastUserBubble.innerText = data.transcript; }
                if (data.is_final) { lastUserBubble.classList.remove("interim"); lastUserBubble = null; }

            } else if (data.type === "alex_response") {
                stopVadTimer();
                lastUserBubble = null;
                addBubble(data.transcript, "alex");

                if (data.audio) {
                    isMuted = true;
                    log("🎤 Mic muted for Alex response (sending silence).");
                    const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
                    const audio = new Audio(URL.createObjectURL(new Blob([bytes], {type: "audio/mp3"})));
                    audio.onended = () => {
                        isMuted = false;
                        log("🎤 Mic resumed.");
                    };
                    audio.play();
                }
            } else if (data.type === "vad_timer_reset") {
                stopVadTimer();
                let timeLeft = data.duration;
                vadTimerDiv.style.opacity = 1;
                vadCountdownInterval = setInterval(() => {
                    timeLeft -= 0.1;
                    if (timeLeft <= 0) { clearInterval(vadCountdownInterval); vadTimerDiv.innerText = t.thinking;
                    } else { vadTimerDiv.innerText = `Alex will respond in ${timeLeft.toFixed(1)}s...`; }
                }, 100);

            } else if (data.type === "error") {
                log(`❌ Backend Error: ${data.message}`);
                cleanup();

            } else if (data.type === "session_report") {
              isSessionFinished = true;
              isMuted = true;
              
              // 1. Obtener los textos en el idioma correcto
              const r = data.report;
              const lang = sessionMetadata.language || "English";
              const txt = TABLE_TEXTS[lang] || TABLE_TEXTS["English"];
              
              statusText.innerText = txt.title + " Listo";
              
              // 2. Crear la tarjeta visual
              const div = document.createElement("div");
              div.style = "background: white; padding: 20px; border-radius: 12px; border: 2px solid #1a73e8; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);";
              
              // 3. Generar las filas de la tabla
              let evalsHtml = r.evaluations.map(ev => 
                  `<tr>
                    <td style="padding: 8px; border-bottom: 1px solid #eee;"><strong>${ev.parameter}</strong></td>
                    <td style="padding: 8px; border-bottom: 1px solid #eee;">${ev.rating}</td>
                    <td style="padding: 8px; border-bottom: 1px solid #eee; color: #1e8e3e;"><strong>${ev.points} ${txt.pts}</strong></td>
                  </tr>`
              ).join("");

              // 4. Ensamblar todo el HTML final con las variables de idioma
              div.innerHTML = `
                  <h3 style="margin-top:0; color: #1a73e8; display: flex; justify-content: space-between;">
                      <span>📊 ${txt.title}</span><span>${r.final_score}%</span>
                  </h3>
                  <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                      <span style="background: #e8f0fe; color: #1a73e8; padding: 4px 10px; border-radius: 16px; font-size: 14px;"><strong>${txt.status}:</strong> ${r.status}</span>
                      <span style="background: #e6f4ea; color: #1e8e3e; padding: 4px 10px; border-radius: 16px; font-size: 14px;"><strong>${txt.total}:</strong> ${r.actual_points}/${r.max_points} ${txt.pts}</span>
                  </div>
                  <table style="width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; margin-bottom: 15px;">
                      <thead>
                        <tr style="background: #f8f9fa;">
                            <th style="padding: 8px;">${txt.param}</th>
                            <th style="padding: 8px;">${txt.rating}</th>
                            <th style="padding: 8px;">${txt.points}</th>
                        </tr>
                      </thead>
                      <tbody>${evalsHtml}</tbody>
                  </table>
                  <div style="background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 13px;">
                      <strong>${txt.feedback}:</strong><br><em>${r.final_comment}</em>
                  </div>`;
              
              // 5. Dibujar en la pantalla
              chatHistory.appendChild(div);
              chatHistory.scrollTop = chatHistory.scrollHeight;
              
              // Opcional: Notificar a Streamlit si necesitas guardar el estado, pero la UI ya está lista
              Streamlit.setComponentValue({ type: "session_report", report: data.report });
              cleanup();
            }
          };

          socket.onclose = () => { if (isRecording) cleanup(); };
          socket.onerror = () => cleanup();

        } catch (err) { log(`❌ Error: ${err.message}`); cleanup(); }
      }

      recordBtn.onclick = () => isRecording ? cleanup() : startRecording();
      updateUI();
      Streamlit.setComponentReady();
      setInterval(Streamlit.setFrameHeight, 500);
    </script>
  </body>
</html>
