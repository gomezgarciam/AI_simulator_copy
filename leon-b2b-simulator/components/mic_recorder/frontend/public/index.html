<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Sales Simulator - Live Mode</title>
    <style>
      body { margin: 0; font-family: 'Inter', 'Google Sans', sans-serif; background: transparent; color: #3c4043; }
      .container { display: flex; flex-direction: column; gap: 15px; padding: 10px; max-width: 100%; }
      #chat-history { display: flex; flex-direction: column; gap: 12px; max-height: 450px; overflow-y: auto; padding: 15px; border-radius: 12px; background: rgba(0, 0, 0, 0.02); border: 1px solid rgba(0, 0, 0, 0.05); }
      .bubble { padding: 10px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); transition: all 0.2s ease; }
      .user { align-self: flex-end; background: #1a73e8; color: white !important; border-bottom-right-radius: 4px; }
      .alex { align-self: flex-start; background: white; color: #3c4043 !important; border-bottom-left-radius: 4px; border: 1px solid #dadce0; }
      .interim { opacity: 0.7; font-style: italic; }
      .controls { display: flex; align-items: center; gap: 12px; }
      button { background-color: #d93025; color: white; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer; font-weight: 500; font-size: 14px; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
      button:hover { background-color: #b21f16; }
      button.recording { background-color: #202124; animation: pulse 2s infinite; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(217, 48, 37, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(217, 48, 37, 0); } 100% { box-shadow: 0 0 0 0 rgba(217, 48, 37, 0); } }
      .status-container { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #5f6368; }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #dadce0; }
      .status-dot.active { background: #1e8e3e; box-shadow: 0 0 4px #1e8e3e; }
      #debug-log { font-size: 10px; color: #9aa0a6; font-family: monospace; margin-top: 8px; border-top: 1px solid #f1f3f4; padding-top: 8px; overflow-wrap: break-word; }
      #vad-timer { font-size: 12px; color: #1e8e3e; font-style: italic; text-align: center; height: 18px; transition: opacity 0.3s; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="controls">
        <button id="record-btn">Start Live Session</button>
        <div class="status-container">
          <div id="status-dot" class="status-dot"></div>
          <span id="status-text">Disconnected</span>
        </div>
      </div>
      
      <div id="vad-timer"></div>
      <div id="chat-history">
        
      </div>

      <div id="debug-log">Ready.</div>
    </div>

    <script>
      const Streamlit = {
        setComponentReady: () => window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1}, "*"),
        setFrameHeight: () => window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: document.body.scrollHeight}, "*"),
      };

      const recordBtn = document.getElementById("record-btn");
      const chatHistory = document.getElementById("chat-history");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const debugLog = document.getElementById("debug-log");
      const vadTimerDiv = document.getElementById("vad-timer");

      let audioContext = null, processor = null, input = null, stream = null, socket = null;
      let isRecording = false, isCleaningUp = false;
      let chunksSent = 0;
      let sessionMetadata = { language: "English", target_company: "Google", role: "CTO" };
      let lastUserBubble = null;
      let vadCountdownInterval = null;

      const UI_TEXTS = {
        "English": { 
            start: "Start Live Session", stop: "Stop Session", 
            live: "Live", disc: "Disconnected", connecting: "Connecting...",
            alex_greeting: "Hello, I'm Alex. I'm ready to listen.",
            thinking: "Alex is thinking..."
        },
        "Spanish": { 
            start: "Iniciar Sesión en Vivo", stop: "Detener Sesión", 
            live: "En Vivo", disc: "Desconectado", connecting: "Conectando...",
            alex_greeting: "Hola, soy Alex. Estoy listo para escuchar.",
            thinking: "Alex está pensando..."
        },
        "Portuguese": { 
            start: "Iniciar Sessão ao Vivo", stop: "Parar Sessão", 
            live: "Ao Vivo", disc: "Desconectado", connecting: "Conectando...",
            alex_greeting: "Olá, eu sou o Alex. Estou pronto para ouvir.",
            thinking: "Alex está a pensar..."
        }
      };

      function log(msg) {
        console.log(msg);
        debugLog.innerText = msg;
      }
      
      function stopVadTimer() {
        if (vadCountdownInterval) clearInterval(vadCountdownInterval);
        vadTimerDiv.innerText = "";
        vadTimerDiv.style.opacity = 0;
      }

      window.addEventListener("message", (e) => {
        if (e.data.type === "streamlit:render" && e.data.args.metadata) {
          sessionMetadata = e.data.args.metadata;
          if (!isRecording) updateUI();
        }
      });

      function updateUI() {
        const t = UI_TEXTS[sessionMetadata.language] || UI_TEXTS["English"];
        if (!isRecording) {
          recordBtn.innerText = t.start;
          statusText.innerText = t.disc;
          chatHistory.innerHTML = '';
          addBubble(t.alex_greeting, "alex");
        }
      }

      function addBubble(text, side, isInterim = false) {
        const b = document.createElement("div");
        b.className = `bubble ${side}`;
        if (isInterim) b.classList.add("interim");
        b.innerText = text;
        chatHistory.appendChild(b);
        chatHistory.scrollTop = chatHistory.scrollHeight;
        return b;
      }

      async function stopAudio() {
        if (isCleaningUp) return;
        isCleaningUp = true;
        log("Stopping audio capture...");
        if (processor) { processor.disconnect(); processor = null; }
        if (input) { input.disconnect(); input = null; }
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        if (audioContext && audioContext.state !== "closed") {
          try { await audioContext.close(); } catch(e) {}
          audioContext = null;
        }
        isCleaningUp = false;
      }

      async function cleanup() {
        log("Cleaning up session...");
        isRecording = false;
        await stopAudio();
        if (socket) {
          if (socket.readyState === WebSocket.OPEN) socket.close();
          socket = null;
        }
        const t = UI_TEXTS[sessionMetadata.language] || UI_TEXTS["English"];
        recordBtn.innerText = t.start;
        recordBtn.classList.remove("recording");
        statusDot.classList.remove("active");
        statusText.innerText = t.disc;
        stopVadTimer();
        lastUserBubble = null;
      }

      async function startRecording() {
        if (isRecording) return;
        
        const t = UI_TEXTS[sessionMetadata.language] || UI_TEXTS["English"];
        
        // --- RESET UI ---
        isRecording = true;
        chunksSent = 0;
        lastUserBubble = null;
        chatHistory.innerHTML = '';
        addBubble(t.alex_greeting, "alex");

        recordBtn.innerText = t.stop;
        recordBtn.classList.add("recording");
        statusText.innerText = t.connecting;

        try {
          // 1. WebSocket
          const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
          let wsHost = window.location.host;
          
          if (wsHost.startsWith("8080-") && wsHost.includes("cloudshell.dev")) {
            wsHost = wsHost.replace("8080-", "8000-");
          } else if (wsHost.includes(":8080")) {
            wsHost = wsHost.replace(":8080", ":8000");
          }
          
          const wsUrl = `${protocol}//${wsHost}/ws/live-transcribe`;
          log("Connecting to WebSocket: " + wsUrl);
          socket = new WebSocket(wsUrl);

          socket.onopen = async () => {
            log("✅ WebSocket Connected");
            statusDot.classList.add("active");
            statusText.innerText = t.live;

            // 2. Audio Context
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const sampleRate = audioContext.sampleRate;
            log(`🎧 Audio Initialized @ ${sampleRate}Hz`);

            // 3. Send Metadata
            socket.send(JSON.stringify({...sessionMetadata, sample_rate: sampleRate}));

            // 4. Start Capture
            input = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);
            
            processor.onaudioprocess = (e) => {
              if (!isRecording || !socket || socket.readyState !== WebSocket.OPEN) return;
              const inputData = e.inputBuffer.getChannelData(0);
              const pcmData = new Int16Array(inputData.length);
              for (let i = 0; i < inputData.length; i++) {
                const s = Math.max(-1, Math.min(1, inputData[i]));
                pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
              }
              socket.send(pcmData.buffer);
            };

            input.connect(processor);
            processor.connect(audioContext.destination);
          };

          socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === "user_transcript") {
                stopVadTimer();
                if (!lastUserBubble) {
                    lastUserBubble = addBubble(data.transcript, "user", true);
                } else {
                    lastUserBubble.innerText = data.transcript;
                }

                if (data.is_final) {
                    lastUserBubble.classList.remove("interim");
                    lastUserBubble = null;
                }
            } else if (data.type === "alex_response") {
                stopVadTimer();
                lastUserBubble = null;
                addBubble(data.transcript, "alex");

                if (data.audio) {
                    if (processor && input) {
                        input.disconnect(processor);
                        log("🎤 Mic muted for Alex's response.");
                    }
                    
                    const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
                    const audio = new Audio(URL.createObjectURL(new Blob([bytes], {type: "audio/mp3"})));
                    
                    audio.onended = () => {
                        if (input && processor) {
                            input.connect(processor);
                            log("🎤 Mic resumed.");
                        }
                    };
                    audio.play();
                }
            } else if (data.type === "vad_timer_reset") {
                stopVadTimer();
                let timeLeft = data.duration;
                vadTimerDiv.style.opacity = 1;
                
                vadCountdownInterval = setInterval(() => {
                    timeLeft -= 0.1;
                    if (timeLeft <= 0) {
                        clearInterval(vadCountdownInterval);
                        vadTimerDiv.innerText = t.thinking;
                    } else {
                        vadTimerDiv.innerText = `Alex will respond in ${timeLeft.toFixed(1)}s...`;
                    }
                }, 100);

            } else if (data.type === "error") {
                log(`❌ Backend Error: ${data.message}`);
                cleanup();
            } else if (data.type === "session_report") {
              const r = data.report;
              const div = document.createElement("div");
              div.style = "background:white; padding:15px; border-radius:12px; border:2px solid #1a73e8; margin-top:10px;";
              div.innerHTML = `<h3 style="margin-top:0;">📊 Report: ${r.final_score}%</h3>
                               <p><strong>Status:</strong> ${r.status}</p>
                               <p><em>${r.final_comment}</em></p>`;
              chatHistory.appendChild(div);
              chatHistory.scrollTop = chatHistory.scrollHeight;
              cleanup();
            }
          };

          socket.onclose = () => { if (isRecording) cleanup(); };
          socket.onerror = () => cleanup();

        } catch (err) {
          log(`❌ Error: ${err.message}`);
          cleanup();
        }
      }

      recordBtn.onclick = () => isRecording ? cleanup() : startRecording();
      
      // Initial UI setup
      updateUI();
      Streamlit.setComponentReady();
      setInterval(Streamlit.setFrameHeight, 500);
    </script>
  </body>
</html>
